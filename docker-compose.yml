# ============================================================
# NileDefender — Docker Compose
# ============================================================
# Usage:
#   docker compose up --build        # Build & start
#   docker compose up -d             # Start in background
#   docker compose down              # Stop & remove
#   docker compose logs -f           # View logs
# ============================================================

services:
  niledefender:
    build: .
    container_name: niledefender
    ports:
      - "5000:5000"
    extra_hosts:
      # Allow scanning services running on the host machine
      # (localhost inside Docker = container itself, not the host)
      - "host.docker.internal:host-gateway"
    volumes:
      # Persist database across container restarts
      - ./output:/app/output
      # Mount config at runtime (keeps API keys out of the image)
      - ./config.ini:/app/config.ini:ro
    environment:
      - PYTHONUNBUFFERED=1
      - RUNNING_IN_DOCKER=1
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    container_name: n8n
    ports:
      - "5677:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5677/
      - GENERIC_TIMEZONE=Africa/Cairo
    restart: unless-stopped

volumes:
  n8n_data:
